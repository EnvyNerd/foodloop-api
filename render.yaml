services:
  - type: web
    name: foodloop-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PLATFORM_FEE_PCT
        value: "15"
      - key: JWT_EXPIRATION_HOURS
        value: "24"
    disk:
      name: foodloop-data
      mountPath: /app/data
      sizeGB: 1
